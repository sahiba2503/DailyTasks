<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="tasks.css">
</head>
<body>
    <h2>Good morning</h2>
    <div id="taskCreateContainer">
    <div class="taskContainer">
    <input type="text" class="taskName">
    <input type="date" class="taskDueDate">
    <button class="createButton">create</button>
    </div>
    <div class="taskStatus">
        <div class="backlogStatus">
            <h3 >Backlog tasks</h3>
            <ul class="backlogTaskList"></ul>
        </div>
        <div  class="activeStatus">
            <h3>Active tasks</h3>
            <ul class="activeTaskList"></ul>
        </div>
         <div class="progressStatus">
            <h3>Progress tasks</h3>
            <ul class="progressTaskList"></ul>
        </div>
        <div class="completedStatus">
            <h3>Completed tasks</h3>
            <ul class="completedTaskLis"></ul>
        </div>
        <div class="expireStatus">
            <h3>Expire tasks</h3>
            <ul class="expireTaskList"></ul>
        </div>
       
    </div>
    </div>
    <script src="tasks.js"></script>
</body>
</html>
